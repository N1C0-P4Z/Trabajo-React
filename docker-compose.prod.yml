# Docker Compose para Producción (Coolify)
# Este archivo está optimizado para despliegue en servidores de producción

services:
  db:
    image: postgres:15-alpine
    container_name: odonto_db_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-odontodb}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - odonto_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: odonto_backend_prod
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/odontodb?schema=public}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - odonto_network
    # Coolify expone el servicio automáticamente

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: odonto_frontend_prod
    environment:
      NODE_ENV: production
      # URL del backend dentro de la red Docker
      VITE_API_URL: ${BACKEND_URL:-http://backend:3001}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - odonto_network
    # Coolify expone el servicio automáticamente

volumes:
  postgres_data_prod:
    driver: local

networks:
  odonto_network:
    driver: bridge
